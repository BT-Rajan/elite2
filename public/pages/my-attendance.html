<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Attendance — Elite 2.0</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="shell">
  <div class="main">
    <div class="page">

      <div class="page-header">
        <div class="page-title">My Attendance</div>
        <div class="page-subtitle">Your class attendance history</div>
      </div>

      <!-- Date filter -->
      <div class="search-bar mb-6">
        <input type="date" class="input" id="from-date" style="width:160px">
        <span class="text-muted text-sm">to</span>
        <input type="date" class="input" id="to-date" style="width:160px">
        <button class="btn btn-secondary" id="filter-btn">Apply</button>
      </div>

      <!-- Summary stats -->
      <div class="stat-grid mb-6" id="att-stats">
        ${Array.from({length:4},()=>`<div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-title mt-2"></div></div>`).join('')}
      </div>

      <!-- Records table -->
      <div class="card" style="padding:0">
        <div id="att-table">
          <div style="padding:1.5rem">${Array.from({length:6},()=>`<div class="skeleton skeleton-row" style="margin-bottom:4px"></div>`).join('')}</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { guardAuth } from '../js/auth-guard.js';
  import { initShell } from '../js/shell.js';
  import api, { store } from '../js/api.js';
  import ui from '../js/ui.js';

  const user = guardAuth(['student']);
  await initShell({ title: 'My Attendance' });

  const now = new Date();
  const fromEl = document.getElementById('from-date');
  const toEl   = document.getElementById('to-date');
  fromEl.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  toEl.value   = now.toISOString().split('T')[0];

  document.getElementById('filter-btn').addEventListener('click', load);

  async function load() {
    const { data, error } = await api.students.attendance(user.id, { from: fromEl.value, to: toEl.value });

    if (error) { document.getElementById('att-table').innerHTML = ui.empty('⚠','Error',error); return; }

    const summary = data.summary || {};
    const records = data.records || [];

    // Stats
    document.getElementById('att-stats').innerHTML = `
      <div class="stat-card fade-up">
        <div class="stat-label">Attendance Rate</div>
        <div class="stat-value ${summary.percentage >= 80 ? 'text-success' : 'text-warning'}">${summary.percentage ?? 0}%</div>
      </div>
      <div class="stat-card fade-up">
        <div class="stat-label">Present</div>
        <div class="stat-value text-success">${summary.present ?? 0}</div>
      </div>
      <div class="stat-card fade-up">
        <div class="stat-label">Late</div>
        <div class="stat-value text-warning">${summary.late ?? 0}</div>
      </div>
      <div class="stat-card fade-up">
        <div class="stat-label">Absent</div>
        <div class="stat-value text-danger">${summary.absent ?? 0}</div>
      </div>
    `;

    // Table
    if (records.length === 0) {
      document.getElementById('att-table').innerHTML = ui.empty('📅','No records','No attendance data for this period.');
      return;
    }

    document.getElementById('att-table').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Date</th><th>Class</th><th>Discipline</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${records.map(r => `
              <tr>
                <td class="text-sm font-mono">${ui.date(r.session_date)}</td>
                <td class="text-sm font-medium">${r.class_title}</td>
                <td class="text-sm text-muted">${r.discipline}</td>
                <td>${ui.attendanceBadge(r.status)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  load();
</script>
</body>
</html>
