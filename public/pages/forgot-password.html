<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Elite 2.0</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-mark">E2</div>
      <div>
        <div class="font-bold" style="font-size:var(--text-xl)">Elite 2.0</div>
        <div class="text-dimmed text-sm">Academy Management</div>
      </div>
    </div>

    <div id="request-view">
      <div class="login-heading">Forgot password?</div>
      <div class="login-sub">Enter your email and we'll send a reset link.</div>

      <div class="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" class="input" placeholder="you@academy.com" autocomplete="email" autofocus>
        </div>
        <div class="form-error hidden" id="req-err"></div>
        <button class="btn btn-primary btn-lg w-full" id="req-btn">Send Reset Link</button>
        <a href="/login.html" class="btn btn-ghost w-full">← Back to sign in</a>
      </div>
    </div>

    <div id="success-view" class="hidden" style="text-align:center;padding:2rem 0">
      <div style="font-size:3rem;margin-bottom:1rem">📧</div>
      <div class="font-bold text-lg">Check your inbox</div>
      <div class="text-muted text-sm mt-2">If that email is registered, a reset link was sent.</div>
      <a href="/login.html" class="btn btn-primary mt-6" style="display:inline-flex">Back to sign in</a>
    </div>

  </div>
</div>

<script type="module">
  import api from '../js/api.js';
  import ui from '../js/ui.js';

  document.getElementById('req-btn').addEventListener('click', async () => {
    const btn   = document.getElementById('req-btn');
    const errEl = document.getElementById('req-err');
    const email = document.getElementById('email').value.trim();
    errEl.classList.add('hidden');
    if (!email) { errEl.textContent = 'Email is required.'; errEl.classList.remove('hidden'); return; }
    ui.setLoading(btn, true);
    await api.auth.forgotPassword(email);
    // Always show success (don't leak whether email exists)
    document.getElementById('request-view').classList.add('hidden');
    document.getElementById('success-view').classList.remove('hidden');
  });
</script>
</body>
</html>
