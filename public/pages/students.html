<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students — Elite 2.0</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="shell">
  <div class="main">
    <div class="page">

      <div class="page-header flex items-center justify-between">
        <div>
          <div class="page-title">Students</div>
          <div class="page-subtitle" id="count-label">Loading…</div>
        </div>
        <button class="btn btn-primary" id="add-student-btn">+ Add Student</button>
      </div>

      <!-- Filters -->
      <div class="search-bar mb-6">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="input" id="search-input" placeholder="Search students…">
        </div>
        <select class="select" id="belt-filter" style="width:180px">
          <option value="">All belts</option>
        </select>
        <select class="select" id="disc-filter" style="width:180px">
          <option value="">All disciplines</option>
        </select>
      </div>

      <!-- Table -->
      <div class="card" style="padding:0">
        <div id="table-wrap">
          <div style="padding:1.5rem">${skeletonRows(6)}</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { guardAuth } from '../js/auth-guard.js';
  import { initShell } from '../js/shell.js';
  import api from '../js/api.js';
  import ui from '../js/ui.js';

  const user = guardAuth(['admin','head_coach','coach']);
  await initShell({ title: 'Students' });

  let students = [];
  let disciplines = [];

  // Load disciplines for filter
  const { data: discData } = await api.admin.disciplines();
  disciplines = discData?.disciplines || [];
  const discFilter = document.getElementById('disc-filter');
  disciplines.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id; opt.textContent = d.name;
    discFilter.appendChild(opt);
  });

  // Debounced search
  let _timer;
  const searchInput = document.getElementById('search-input');
  const beltFilter  = document.getElementById('belt-filter');

  searchInput.addEventListener('input',  () => { clearTimeout(_timer); _timer = setTimeout(load, 350); });
  beltFilter.addEventListener('change',  load);
  discFilter.addEventListener('change',  load);

  async function load() {
    const params = {};
    const s = searchInput.value.trim();
    if (s) params.search = s;
    const belt = beltFilter.value;
    if (belt) params.belt_id = belt;
    const disc = discFilter.value;
    if (disc) params.discipline_id = disc;

    document.getElementById('table-wrap').innerHTML = `<div style="padding:1.5rem">${skeletonRows(6)}</div>`;

    const { data, error } = await api.students.list(params);
    students = data?.students || [];

    if (error) {
      document.getElementById('table-wrap').innerHTML = ui.empty('⚠', 'Failed to load', error);
      return;
    }

    document.getElementById('count-label').textContent = `${data.total} student${data.total !== 1 ? 's' : ''}`;
    renderTable(students);
  }

  function renderTable(rows) {
    if (rows.length === 0) {
      document.getElementById('table-wrap').innerHTML = ui.empty('👤', 'No students found', 'Try adjusting your search filters.');
      return;
    }

    document.getElementById('table-wrap').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Discipline</th>
              <th>Belt</th>
              <th>Enrolled</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(s => `
              <tr>
                <td>
                  <div class="flex items-center gap-3">
                    ${ui.avatar({ name: s.first_name + ' ' + s.last_name, avatar: s.avatar })}
                    <div>
                      <div class="font-medium">${s.first_name} ${s.last_name}</div>
                      <div class="text-xs text-dimmed">${s.email}</div>
                    </div>
                  </div>
                </td>
                <td class="text-sm text-muted">${s.discipline_name || '—'}</td>
                <td>
                  <div class="flex items-center gap-2">
                    ${ui.beltDot(s.belt_color, s.belt_name)}
                    <span class="text-sm">${s.belt_name || 'No belt'}</span>
                  </div>
                </td>
                <td class="text-sm text-muted">${ui.date(s.enrolled_at)}</td>
                <td>
                  <div class="flex items-center gap-2 justify-end">
                    <button class="btn btn-secondary btn-sm" onclick="viewStudent(${s.id})">View</button>
                    ${user.role !== 'coach' ? `<button class="btn btn-danger btn-sm" onclick="removeStudent(${s.id}, '${s.first_name}')">Remove</button>` : ''}
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // ── View student modal ─────────────────────────────────────────────────────
  window.viewStudent = async (id) => {
    const { data } = await api.students.get(id);
    const s = data?.student;
    if (!s) { ui.toast.error('Could not load student.'); return; }

    const { close } = ui.modal({
      title: `${s.first_name} ${s.last_name}`,
      size: 'lg',
      content: `
        <div class="flex items-center gap-4" style="margin-bottom:1.5rem">
          ${ui.avatar({ name: s.first_name + ' ' + s.last_name, avatar: s.avatar, size: 'xl' })}
          <div>
            <div class="text-lg font-bold">${s.first_name} ${s.last_name}</div>
            <div class="text-sm text-muted">${s.email}</div>
            <div class="flex gap-2 mt-2">
              ${ui.beltDot(s.belt_color, s.belt_name)}
              <span class="text-sm">${s.belt_name || 'No belt'}</span>
              <span class="text-dimmed">·</span>
              <span class="text-sm">${s.discipline_name || 'No discipline'}</span>
            </div>
          </div>
        </div>
        <div class="form-grid form-grid-2">
          <div class="form-group"><label>Phone</label><div class="text-sm">${s.phone || '—'}</div></div>
          <div class="form-group"><label>Enrolled</label><div class="text-sm">${ui.date(s.enrolled_at)}</div></div>
          <div class="form-group"><label>Total Points</label><div class="text-sm font-mono text-accent">${s.total_points}</div></div>
          <div class="form-group"><label>Emergency Contact</label><div class="text-sm">${s.emergency_name || '—'} ${s.emergency_phone ? '(' + s.emergency_phone + ')' : ''}</div></div>
        </div>
        ${s.notes ? `<div class="form-group mt-4"><label>Notes</label><div class="text-sm text-muted">${s.notes}</div></div>` : ''}
        <div class="modal-footer">
          <a href="belt-progress.html?id=${s.id}" class="btn btn-secondary">Belt Progress</a>
          <a href="evaluations.html?student=${s.id}" class="btn btn-primary">Evaluate</a>
        </div>`,
    });
  };

  // ── Remove student ─────────────────────────────────────────────────────────
  window.removeStudent = async (id, name) => {
    const ok = await ui.confirm({ title: 'Remove Student', message: `Remove ${name} from the system?`, confirmText: 'Remove', danger: true });
    if (!ok) return;
    const { error } = await api.students.delete(id);
    if (error) { ui.toast.error(error); return; }
    ui.toast.success(`${name} removed.`);
    load();
  };

  // ── Add student modal ──────────────────────────────────────────────────────
  document.getElementById('add-student-btn').addEventListener('click', () => {
    const { body, close } = ui.modal({ title: 'Add Student' });
    body.innerHTML = `
      <div class="form-grid form-grid-2" style="gap:1rem">
        <div class="form-group"><label>First Name</label><input class="input" id="fn" placeholder="First name"></div>
        <div class="form-group"><label>Last Name</label><input class="input" id="ln" placeholder="Last name"></div>
        <div class="form-group"><label>Email</label><input class="input" id="em" type="email" placeholder="Email"></div>
        <div class="form-group"><label>Phone</label><input class="input" id="ph" placeholder="Phone"></div>
        <div class="form-group"><label>Password</label><input class="input" id="pw" type="password" placeholder="Temporary password"></div>
        <div class="form-group">
          <label>Discipline</label>
          <select class="select" id="disc">
            <option value="">Select discipline</option>
            ${disciplines.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-error hidden" id="add-err"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="add-cancel">Cancel</button>
        <button class="btn btn-primary" id="add-save">Create Student</button>
      </div>`;

    document.getElementById('add-cancel').onclick = close;
    document.getElementById('add-save').onclick = async () => {
      const saveBtn = document.getElementById('add-save');
      ui.setLoading(saveBtn, true);
      const { data, error } = await api.auth.register({
        first_name:    document.getElementById('fn').value,
        last_name:     document.getElementById('ln').value,
        email:         document.getElementById('em').value,
        phone:         document.getElementById('ph').value,
        password:      document.getElementById('pw').value,
        role:          'student',
        discipline_id: document.getElementById('disc').value || null,
      });
      ui.setLoading(saveBtn, false, 'Create Student');
      if (error) { document.getElementById('add-err').textContent = error; document.getElementById('add-err').classList.remove('hidden'); return; }
      ui.toast.success('Student created.');
      close();
      load();
    };
  });

  function skeletonRows(n) {
    return Array.from({length:n}, () => `<div class="skeleton skeleton-row" style="margin-bottom:4px"></div>`).join('');
  }

  load();
</script>
</body>
</html>
