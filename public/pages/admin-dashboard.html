<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Elite 2.0</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="shell">
  <div class="main">
    <div class="page">

      <div class="page-header">
        <div class="page-title" id="greeting">Admin Dashboard</div>
        <div class="page-subtitle">System overview and quick actions</div>
      </div>

      <div class="stat-grid" id="stats">
        ${Array.from({length:4},()=>`<div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-title mt-2"></div></div>`).join('')}
      </div>

      <div class="grid" style="grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:0">
        <!-- Quick actions -->
        <div class="card">
          <div class="card-header"><div class="card-title">Quick Actions</div></div>
          <div class="flex flex-col gap-3">
            <a href="/pages/users.html" class="btn btn-secondary w-full" style="justify-content:flex-start">👥 Manage Users</a>
            <a href="/pages/disciplines.html" class="btn btn-secondary w-full" style="justify-content:flex-start">🥋 Curriculum Settings</a>
            <a href="/pages/coaches.html" class="btn btn-secondary w-full" style="justify-content:flex-start">🏅 Coach Assignments</a>
            <a href="/pages/settings.html" class="btn btn-secondary w-full" style="justify-content:flex-start">⚙ System Settings</a>
            <a href="/pages/seminars.html" class="btn btn-secondary w-full" style="justify-content:flex-start">🎓 Seminars</a>
          </div>
        </div>

        <!-- System info -->
        <div class="card">
          <div class="card-header"><div class="card-title">System</div></div>
          <div id="sys-info">
            <div class="skeleton skeleton-row mb-2"></div>
            <div class="skeleton skeleton-row mb-2"></div>
            <div class="skeleton skeleton-row"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { guardAuth } from '/js/auth-guard.js';
  import { initShell } from '/js/shell.js';
  import api, { store } from '/js/api.js';
  import ui from '/js/ui.js';

  const user = guardAuth(['admin']);
  await initShell({ title: 'Admin Dashboard' });
  document.getElementById('greeting').textContent = `Welcome, ${user.first_name}`;

  const [dashRes, settingsRes] = await Promise.all([
    api.analytics.dashboard(),
    api.admin.settings(),
  ]);

  const d = dashRes.data;
  const settings = settingsRes.data?.settings || {};

  document.getElementById('stats').innerHTML = `
    <div class="stat-card fade-up">
      <div class="stat-label">Total Students</div>
      <div class="stat-value text-accent">${d?.totals?.students ?? '—'}</div>
    </div>
    <div class="stat-card fade-up">
      <div class="stat-label">Active Coaches</div>
      <div class="stat-value">${d?.totals?.coaches ?? '—'}</div>
    </div>
    <div class="stat-card fade-up">
      <div class="stat-label">Avg Attendance</div>
      <div class="stat-value">${d?.avg_attendance_30d ?? '—'}%</div>
      <div class="stat-change">30-day average</div>
    </div>
    <div class="stat-card fade-up">
      <div class="stat-label">Pending Promotions</div>
      <div class="stat-value ${d?.totals?.pending_promotions > 0 ? 'text-warning' : ''}">${d?.totals?.pending_promotions ?? '—'}</div>
    </div>
  `;

  document.getElementById('sys-info').innerHTML = `
    <div style="padding:0.5rem 0;border-bottom:1px solid var(--color-border)" class="flex justify-between text-sm">
      <span class="text-muted">Academy Name</span>
      <span class="font-medium">${settings.academy_name || 'Elite 2.0'}</span>
    </div>
    <div style="padding:0.5rem 0;border-bottom:1px solid var(--color-border)" class="flex justify-between text-sm">
      <span class="text-muted">Points per class</span>
      <span class="font-mono">${settings.points_attendance || 10}</span>
    </div>
    <div style="padding:0.5rem 0;border-bottom:1px solid var(--color-border)" class="flex justify-between text-sm">
      <span class="text-muted">Points per promotion</span>
      <span class="font-mono">${settings.points_promotion || 200}</span>
    </div>
    <div style="padding:0.5rem 0" class="flex justify-between text-sm">
      <span class="text-muted">Late attendance credit</span>
      <span class="font-mono">${settings.attendance_late_credit || 0.5}×</span>
    </div>
    <div class="mt-4">
      <a href="/pages/settings.html" class="btn btn-secondary w-full">Edit Settings</a>
    </div>
  `;
</script>
</body>
</html>
