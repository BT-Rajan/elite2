<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Elite 2.0</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="shell">
  <div class="main">
    <div class="page">

      <div class="page-header">
        <div class="page-title" id="greeting">Dashboard</div>
        <div class="page-subtitle" id="today-date"></div>
      </div>

      <!-- Today's classes -->
      <div class="card mb-6">
        <div class="card-header">
          <div class="card-title">Today's Classes</div>
          <a href="schedule.html" class="btn btn-ghost btn-sm">Full schedule</a>
        </div>
        <div id="today-classes"><div class="skeleton skeleton-row"></div><div class="skeleton skeleton-row mt-2"></div></div>
      </div>

      <!-- Quick stats -->
      <div class="stat-grid" id="coach-stats">
        <div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-title mt-2"></div></div>
        <div class="stat-card"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-title mt-2"></div></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { guardAuth } from '../js/auth-guard.js';
  import { initShell } from '../js/shell.js';
  import api, { store } from '../js/api.js';
  import ui from '../js/ui.js';

  const user = guardAuth(['coach']);
  await initShell({ title: 'Dashboard' });

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const today = new Date();
  document.getElementById('greeting').textContent = `Good to see you, ${user.first_name}`;
  document.getElementById('today-date').textContent = today.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  // Load today's classes
  const { data: classData } = await api.classes.list();
  const todayDow = today.getDay();
  const todayClasses = (classData?.classes || []).filter(c => parseInt(c.day_of_week) === todayDow);

  const classesEl = document.getElementById('today-classes');
  if (todayClasses.length === 0) {
    classesEl.innerHTML = ui.empty('📅', 'No classes today', 'Enjoy your rest day!');
  } else {
    classesEl.innerHTML = todayClasses.map(c => `
      <div class="flex items-center gap-3" style="padding:0.75rem 0;border-bottom:1px solid var(--color-border)">
        <div style="width:60px;text-align:center">
          <div class="font-mono text-sm text-accent">${c.start_time.slice(0,5)}</div>
          <div class="text-xs text-dimmed">${c.end_time.slice(0,5)}</div>
        </div>
        <div class="flex-1">
          <div class="font-medium text-sm">${c.title}</div>
          <div class="text-xs text-dimmed">${c.discipline_name}${c.location ? ' · ' + c.location : ''}</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openAttendance(${c.id})">Take Attendance</button>
      </div>
    `).join('');
  }

  // Coach report stats
  const { data: report } = await api.analytics.coachReport();
  document.getElementById('coach-stats').innerHTML = `
    <div class="stat-card fade-up">
      <div class="stat-label">Sessions This Month</div>
      <div class="stat-value text-accent">${report?.sessions ?? '—'}</div>
    </div>
    <div class="stat-card fade-up">
      <div class="stat-label">Evaluations This Month</div>
      <div class="stat-value">${report?.evaluations ?? '—'}</div>
    </div>
  `;

  window.openAttendance = async (classId) => {
    const dateStr = today.toISOString().split('T')[0];
    const { data, error } = await api.attendance.open(classId, dateStr);
    if (error) { ui.toast.error(error); return; }
    window.location.href = `/pages/attendance.html?session=${data.id}`;
  };
</script>
</body>
</html>
